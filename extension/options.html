<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      max-width: 480px;
      margin: 40px auto;
      padding: 0 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
    }
    h1 { font-size: 20px; margin: 0 0 8px 0; }
    p { color: #666; margin: 0 0 24px 0; }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
    }
    input[type="url"], input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    input:disabled {
      background: #f5f5f5;
      color: #999;
    }
    .mode-group {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .mode-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
    }
    .mode-btn.active {
      border-color: #6366f1;
      background: #eef2ff;
      color: #4338ca;
    }
    .hint {
      font-size: 12px;
      color: #666;
      margin: -12px 0 16px 0;
    }
    button {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      background: #6366f1;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #4f46e5; }
    #testBtn {
      background: #fff;
      color: #6366f1;
      border: 2px solid #6366f1;
      margin-left: 8px;
    }
    #testBtn:hover { background: #eef2ff; }
    .status {
      margin-top: 12px;
      font-size: 13px;
      color: #1a5c1a;
    }
    .status.error { color: #991b1b; }
    .status.warn { color: #92400e; }
  </style>
</head>
<body>
  <h1>Hermes Eyes</h1>
  <p>Configure where the extension connects.</p>

  <label>Connection Mode</label>
  <div class="mode-group">
    <div class="mode-btn active" data-mode="local">Localhost</div>
    <div class="mode-btn" data-mode="public">Public Tunnel</div>
  </div>

  <div id="localSection">
    <label for="localUrl">Relay WebSocket URL</label>
    <input type="url" id="localUrl" value="ws://localhost:3500/ws">
  </div>

  <div id="publicSection" style="display:none;">
    <label for="publicUrl">Public Relay URL</label>
    <input type="url" id="publicUrl" placeholder="wss://abc123.ngrok.io/ws">
    <p class="hint">Paste your ngrok/Cloudflare tunnel URL. Must use wss:// for public URLs.</p>
  </div>

  <button id="saveBtn">Save</button>
  <button id="testBtn">Test Connection</button>
  <div id="status" class="status"></div>

  <script src="options.js"></script>
</body>
</html>
