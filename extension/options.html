<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      max-width: 480px;
      margin: 40px auto;
      padding: 0 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
    }
    h1 { font-size: 20px; margin: 0 0 8px 0; }
    p { color: #666; margin: 0 0 24px 0; }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
    }
    input[type="url"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    button {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      background: #6366f1;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #4f46e5; }
    .status {
      margin-top: 12px;
      font-size: 13px;
      color: #1a5c1a;
    }
  </style>
</head>
<body>
  <h1>Hermes Browser Relay</h1>
  <p>Configure where the extension connects.</p>
  <label for="relayUrl">Relay WebSocket URL</label>
  <input type="url" id="relayUrl" placeholder="ws://localhost:3500/ws">
  <button id="saveBtn">Save</button>
  <div id="status" class="status"></div>
  <script src="options.js"></script>
</body>
</html>
